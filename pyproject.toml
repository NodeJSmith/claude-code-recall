[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ccrecall"
version = "0.9.0"
description = "Conversation history and semantic search for Claude Code"
requires-python = ">=3.10"
# Pinned to the versions in uv.lock: `uv tool install -e` (how install.py
# installs this package) ignores uv.lock and resolves fresh, so an unbounded
# range would pull newer ABI/runtime-breaking releases of these native wheels.
# onnxruntime/numpy use Python-version markers to match the per-version pins.
# To re-sync after a bump: `uv lock` then mirror the resolved versions here.
dependencies = [
    "sqlite-vec==0.1.9",
    "tokenizers==0.23.1",
    "onnxruntime==1.24.3; python_version < '3.11'",
    "onnxruntime==1.26.0; python_version >= '3.11'",
    "numpy==2.2.6; python_version < '3.11'",
    "numpy==2.4.6; python_version >= '3.11'",
]

[project.scripts]
# Hook entry points (wired in settings.json)
cm-memory-setup          = "ccrecall.hooks.memory_setup:main"
cm-memory-sync           = "ccrecall.hooks.memory_sync:main"
cm-memory-context        = "ccrecall.hooks.memory_context:main"
cm-onboarding            = "ccrecall.hooks.onboarding:main"
cm-clear-handoff         = "ccrecall.hooks.clear_handoff:main"
# Internal helpers (called as subprocesses by hooks above)
cm-sync-current          = "ccrecall.hooks.sync_current:main"
cm-backfill-summaries    = "ccrecall.hooks.backfill_summaries:main"
cm-backfill-embeddings   = "ccrecall.hooks.backfill_embeddings:main"
cm-import-conversations  = "ccrecall.hooks.import_conversations:main"
cm-write-config          = "ccrecall.hooks.write_config:main"
# Skill CLI tools (called from SKILL.md files)
cm-recent-chats          = "ccrecall.recent_chats:main"
cm-search-conversations  = "ccrecall.search_conversations:main"
cm-ingest-token-data     = "ccrecall.token_dashboard:main"
cm-session-tail          = "ccrecall.session_tail:main"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
