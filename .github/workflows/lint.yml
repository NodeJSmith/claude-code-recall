name: Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    prek:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Install prek
              uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2
              with:
                  install-only: true

            - name: Cache prek environments
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: ~/.cache/prek
                  key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

            - name: Run hooks (pre-commit stage)
              run: prek run --all-files --stage pre-commit

            - name: Run hooks (pre-push stage)
              run: prek run --all-files --stage pre-push

    security:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  python-version: "3.13"

            - name: Export requirements and audit
              # Audit runtime dependencies only — dev tools (pytest, hypothesis) are
              # not shipped, so a CVE in them is not a supply-chain risk for users.
              run: |
                  uv export --frozen --no-hashes --no-emit-project --no-group dev > requirements.txt
                  uvx pip-audit@2.10.0 -r requirements.txt
