# prek / pre-commit configuration.
#
# prek is a faster drop-in for pre-commit that reads this same file. Install the
# hooks locally with `prek install`.
#
# Staging: fast, always-green hooks run at pre-commit; heavier checks run at
# pre-push. `default_install_hook_types` below wires both stages automatically.
#
# Phased rollout: several guards (ruff lint, pyright, and the custom AST checks)
# are committed but COMMENTED OUT at the bottom of this file. The current tree has
# pre-existing violations of each; every one gets fixed and flipped on in its own
# follow-up cleanup PR. Until then, only the green hooks below are active so the
# hook run and the lint CI stay green.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: debug-statements

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
        args: [--force-exclude]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.17"
    hooks:
      # Formatter is green today; the linter is staged off below until cleanup.
      - id: ruff-format

  - repo: local
    hooks:
      - id: zizmor
        name: zizmor (GitHub Actions security)
        language: system
        # --offline keeps zizmor from calling the GitHub API (audits the static
        # workflow files only); unsetting the tokens guarantees offline mode even
        # when a token is present in the environment.
        entry: env -u GH_TOKEN -u GITHUB_TOKEN uvx zizmor@1.25.2 --offline
        files: ^\.github/workflows/
        stages: [pre-commit, pre-push]

      # Ban mypy-style `# type: ignore` comments — use `# pyright: ignore[reportXxx]`.
      - id: no-mypy-ignore
        name: 'Ban "type: ignore" comments (use pyright)'
        language: pygrep
        types: [python]
        entry: '# type: ignore'

      # Ban `from __future__ import annotations` — it stringizes annotations at
      # runtime, breaking Pydantic models, FastAPI deps, and get_type_hints().
      # Anchored to line start so prose merely mentioning it is not flagged.
      - id: no-future-annotations
        name: "Ban from __future__ import annotations (breaks runtime annotations)"
        language: pygrep
        types: [python]
        entry: '^from __future__ import annotations'

  # ----------------------------------------------------------------------------
