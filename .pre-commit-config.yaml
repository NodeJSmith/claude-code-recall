# prek / pre-commit configuration.
#
# prek is a faster drop-in for pre-commit that reads this same file. Install the
# hooks locally with `prek install`.
#
# Staging: fast, always-green hooks run at pre-commit; heavier checks run at
# pre-push. `default_install_hook_types` below wires both stages automatically.
#
# Phased rollout: every guard ported from hassette has been brought to green and
# flipped on in its own cleanup PR. ruff lint was the last — the tree is now clean
# under the full guard set, so there are no deferred hooks remaining.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: debug-statements
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
        args: [--force-exclude]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.17"
    hooks:
      # Linter runs before the formatter so autofixes are reformatted in the same pass.
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: zizmor
        name: zizmor (GitHub Actions security)
        language: system
        # --offline keeps zizmor from calling the GitHub API (audits the static
        # workflow files only); unsetting the tokens guarantees offline mode even
        # when a token is present in the environment.
        entry: env -u GH_TOKEN -u GITHUB_TOKEN uvx zizmor@1.25.2 --offline
        files: ^\.github/workflows/
        stages: [pre-commit, pre-push]

      # Validate codecov.yml against Codecov's API (only when it changes).
      - id: check-codecov-yml
        name: Check codecov.yml validity
        language: system
        entry: curl --connect-timeout 10 --max-time 60 --fail --data-binary @./.github/codecov.yml https://codecov.io/validate
        files: ^\.github/codecov\.yml$
        pass_filenames: false
        stages: [pre-commit, pre-push]

      # Ban mypy-style `# type: ignore` comments — use `# pyright: ignore[reportXxx]`.
      - id: no-mypy-ignore
        name: 'Ban "type: ignore" comments (use pyright)'
        language: pygrep
        types: [python]
        entry: '# type: ignore'

      # Ban `from __future__ import annotations` — it stringizes annotations at
      # runtime, breaking Pydantic models, FastAPI deps, and get_type_hints().
      # Anchored to line start so prose merely mentioning it is not flagged.
      - id: no-future-annotations
        name: "Ban from __future__ import annotations (breaks runtime annotations)"
        language: pygrep
        types: [python]
        entry: '^from __future__ import annotations'

  - repo: local
    hooks:
      - id: check-spec-tokens
        name: Ban leaked spec-artifact tokens (AC#/FR#/T##/WP#)
        language: system
        entry: ./tools/check_spec_tokens.py
        pass_filenames: false
        files: ^(src|tests|scripts|tools)/.*\.py$
        stages: [pre-push]

      - id: check-llm-cruft
        name: Ban AI-writing tells (section dividers, filler phrases)
        language: system
        entry: ./tools/check_llm_cruft.py
        pass_filenames: false
        files: ^(src|tests|scripts|tools)/.*\.py$
        stages: [pre-push]

      - id: check-lazy-imports
        name: Ban lazy imports (use '# lazy-import:' to defend circular-import cases)
        language: system
        entry: ./tools/check_lazy_imports.py
        pass_filenames: false
        files: ^(src|tests|scripts|tools)/.*\.py$
        stages: [pre-push]

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      # pass_filenames: false so pyright runs over its configured include (src/)
      # via pyrightconfig.json rather than per-file — explicit file args would
      # override `include` and pull in tests/, which are intentionally unchecked.
      # Whole-project is also correct for a type-checker: one file's change can
      # break types in another.
      - id: pyright
        pass_filenames: false
        stages: [pre-push]
